<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zelo PDV</title>
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Default SEO — overridden per-route via <svelte:head> -->
    <meta name="description" content="Sistema de gestão e frente de caixa para pequenos negócios. Controle vendas, fiado e despesas de forma simples. Teste grátis por 7 dias." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://zelopdv.com.br" />

    <!-- Open Graph (default — individual pages should override og:title, og:description, og:url) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zelo PDV" />
    <meta property="og:title" content="Zelo PDV — Sistema de Gestão para Pequenos Negócios" />
    <meta property="og:description" content="Frente de caixa ágil, controle de fiado e gestão financeira em um só lugar. Teste grátis por 7 dias." />
    <meta property="og:image" content="https://zelopdv.com.br/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://zelopdv.com.br" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card (default) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zelo PDV — Sistema de Gestão para Pequenos Negócios" />
    <meta name="twitter:description" content="Frente de caixa ágil, controle de fiado e gestão financeira em um só lugar. Teste grátis por 7 dias." />
    <meta name="twitter:image" content="https://zelopdv.com.br/og-image.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
